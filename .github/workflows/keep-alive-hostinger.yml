name: Keep Alive Hostinger

# Hostinger puede suspender la app Node si no recibe tráfico HTTP externo.
# El ping interno (localhost) en index.ts no cuenta para el panel de Hostinger.
# Este workflow hace un GET cada 5 min desde GitHub → despierta Lucy antes de webhooks Kommo.
# También dispara el cron de aprendizaje (sync chats humanos + extracción) para que
# Lucy lea de verdad los chats de Alejandro y genere/aprueba ejemplos.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /api/health
        env:
          LUCY_PUBLIC_URL: ${{ vars.LUCY_PUBLIC_URL }}
        run: |
          BASE="${LUCY_PUBLIC_URL:-https://midnightblue-mosquito-424375.hostingersite.com}"
          URL="${BASE%/}/api/health"
          echo "Keep-alive → $URL"
          HTTP=$(curl -sS -o /tmp/lucy-health.json -w "%{http_code}" --max-time 45 "$URL")
          cat /tmp/lucy-health.json || true
          echo ""
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: health respondió HTTP $HTTP"
            if [ -f /tmp/lucy-health.json ]; then
              BUILT=$(node -e "try{const j=JSON.parse(require('fs').readFileSync('/tmp/lucy-health.json','utf8'));console.log(j.built_at_display||j.built_at||'desconocido')}catch{console.log('sin JSON')}" 2>/dev/null || echo "sin JSON")
              echo "Última build conocida en respuesta: $BUILT"
            fi
            exit 1
          fi
          PROMPT=$(node -e "const j=JSON.parse(require('fs').readFileSync('/tmp/lucy-health.json','utf8'));console.log((j.lucy_prompt||'?')+' · '+(j.built_at_display||j.built_at||'?'))" 2>/dev/null || echo "?")
          echo "OK — Lucy despierta (HTTP $HTTP) — $PROMPT"

      - name: Ping cron aprendizaje (sync + extract chats humanos)
        env:
          LUCY_PUBLIC_URL: ${{ vars.LUCY_PUBLIC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          BASE="${LUCY_PUBLIC_URL:-https://midnightblue-mosquito-424375.hostingersite.com}"
          URL="${BASE%/}/api/kommo/cron/learning"
          if [ -n "$CRON_SECRET" ]; then
            URL="${URL}?secret=${CRON_SECRET}"
          fi
          echo "Aprendizaje cron → $URL"
          HTTP=$(curl -sS -o /tmp/lucy-learning.json -w "%{http_code}" --max-time 90 "$URL" || echo "000")
          cat /tmp/lucy-learning.json || true
          echo ""
          if [ "$HTTP" = "200" ]; then
            echo "OK — cron aprendizaje HTTP $HTTP"
            node -e "try{const j=JSON.parse(require('fs').readFileSync('/tmp/lucy-learning.json','utf8'));console.log('leads='+(j.leads??'?')+' candidates='+(j.candidates??'?'))}catch{}"
          elif [ "$HTTP" = "401" ]; then
            echo "AVISO: cron learning unauthorized (revisa secret CRON_SECRET en GitHub Actions)."
          else
            # No fallar el keep-alive por un error puntual del cron de aprendizaje.
            echo "AVISO: cron aprendizaje HTTP $HTTP — Lucy sigue despierta; se reintentará en 5 min."
          fi
