name: Keep Alive Hostinger

# Hostinger puede suspender la app Node si no recibe tráfico HTTP externo.
# El ping interno (localhost) en index.ts no cuenta para el panel de Hostinger.
# Este workflow hace un GET cada 5 min desde GitHub → despierta Lucy antes de webhooks Kommo.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /api/health
        env:
          LUCY_PUBLIC_URL: ${{ vars.LUCY_PUBLIC_URL }}
        run: |
          BASE="${LUCY_PUBLIC_URL:-https://midnightblue-mosquito-424375.hostingersite.com}"
          URL="${BASE%/}/api/health"
          echo "Keep-alive → $URL"
          HTTP=$(curl -sS -o /tmp/lucy-health.json -w "%{http_code}" --max-time 45 "$URL")
          cat /tmp/lucy-health.json || true
          echo ""
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: health respondió HTTP $HTTP"
            exit 1
          fi
          echo "OK — Lucy despierta (HTTP $HTTP)"
