name: Deploy Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Verificar secrets configurados
        env:
          HAS_WEBHOOK: ${{ secrets.HOSTINGER_WEBHOOK_URL != '' }}
          HAS_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN != '' }}
        run: |
          echo "HOSTINGER_WEBHOOK_URL configurado: $HAS_WEBHOOK"
          echo "HOSTINGER_API_TOKEN configurado: $HAS_API_TOKEN"
          if [ "$HAS_WEBHOOK" != "true" ] && [ "$HAS_API_TOKEN" != "true" ]; then
            echo ""
            echo "ERROR: Ningún secret de Hostinger encontrado."
            echo "Añade en GitHub → Settings → Secrets and variables → Actions:"
            echo "  - HOSTINGER_API_TOKEN  (recomendado)"
            echo "  - o HOSTINGER_WEBHOOK_URL"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Comprobar bundle y fecha de build
        run: |
          if [ ! -f deploy/build-meta.json ]; then
            echo "ERROR: falta deploy/build-meta.json — el bundle no tiene fecha de actualización."
            echo "Ejecuta: cd api-server && npm run build && commit deploy/"
            exit 1
          fi
          echo "build-meta.json en repo:"
          cat deploy/build-meta.json
          META_COMMIT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('deploy/build-meta.json','utf8')).git_commit||'')")
          if [ -n "$META_COMMIT" ] && [ "$META_COMMIT" != "${{ github.sha }}" ]; then
            echo "AVISO: deploy/build-meta.json tiene commit $META_COMMIT pero el push es ${{ github.sha }}"
            echo "El código en Hostinger puede no coincidir con main hasta el próximo build+commit de deploy/"
          fi

      - name: Trigger Hostinger Git webhook
        env:
          WEBHOOK_URL: ${{ secrets.HOSTINGER_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "HOSTINGER_WEBHOOK_URL no configurado."
            echo "Sin webhook, Hostinger solo actualiza si redespliegas manualmente en hPanel"
            echo "o si tienes auto-deploy Git conectado al push de main."
            exit 0
          fi
          echo "Disparando redeploy en Hostinger..."
          HTTP=$(curl -s -o /tmp/hostinger-deploy.out -w "%{http_code}" -X POST "$WEBHOOK_URL")
          cat /tmp/hostinger-deploy.out || true
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "Webhook respondió HTTP $HTTP"
            exit 1
          fi
          echo "Redeploy disparado (HTTP $HTTP)"

      - name: Deploy via Hostinger API (upload + restart)
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_DOMAIN: midnightblue-mosquito-424375.hostingersite.com
        run: |
          if [ -z "$HOSTINGER_API_TOKEN" ]; then
            echo "HOSTINGER_API_TOKEN no configurado — saltando API deploy/restart."
            exit 0
          fi
          echo "Nota: el upload multipart puede fallar por Cloudflare; el script hace restart igual."
          node scripts/deploy-hostinger.mjs

      - name: Esperar arranque tras restart
        run: sleep 20

      - name: Verificar salud (relajado — prioriza salir de 503)
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
          LUCY_PUBLIC_URL: ${{ vars.LUCY_PUBLIC_URL }}
          VERIFY_ACCEPT_ANY_OK: "1"
          VERIFY_ATTEMPTS: "24"
          VERIFY_INTERVAL_MS: "10000"
        run: node scripts/verify-deploy.mjs

      - name: Reintento restart si sigue caído
        if: failure()
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_DOMAIN: midnightblue-mosquito-424375.hostingersite.com
        run: |
          if [ -z "$HOSTINGER_API_TOKEN" ]; then
            echo "Sin token — no se puede reiniciar."
            exit 1
          fi
          echo "Primer verify falló — segundo restart…"
          node scripts/deploy-hostinger.mjs --restart
          sleep 25
          VERIFY_ACCEPT_ANY_OK=1 VERIFY_ATTEMPTS=18 VERIFY_INTERVAL_MS=10000 \
            node scripts/verify-deploy.mjs
