<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aprendizaje de Lucy — Bodasesor</title>
  <base href="/aprendizaje/" />
  <style id="aprendizaje-inline-style">
:root {
  --bg: #f4f6f9;
  --surface: #ffffff;
  --surface-soft: #f8fafc;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;
  --text: #0f172a;
  --text-secondary: #475569;
  --muted: #64748b;
  --accent: #b8941f;
  --accent-dark: #8a6f12;
  --accent-soft: #fef9e8;
  --accent-border: #e8d48a;
  --danger: #dc2626;
  --danger-soft: #fef2f2;
  --success: #15803d;
  --success-soft: #f0fdf4;
  --success-border: #86efac;
  --warn: #b45309;
  --warn-soft: #fffbeb;
  --warn-border: #fcd34d;
  --blue: #2563eb;
  --blue-soft: #eff6ff;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
  --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
  --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.hidden { display: none !important; }

.secondary-tabs {
  margin-top: 0.5rem;
  opacity: 0.98;
}

.sync-status {
  margin: 0 0 1rem;
  padding: 0.75rem 1rem;
  background: var(--blue-soft);
  border: 1px solid #bfdbfe;
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-size: 0.9rem;
}

a { color: var(--accent-dark); text-decoration: none; font-weight: 500; }
a:hover { text-decoration: underline; }

.error { color: var(--danger); font-size: 0.9rem; margin-top: 0.75rem; }

/* ─── Login ─────────────────────────────────────────────────── */
.login-wrap {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 2rem;
  background: linear-gradient(180deg, #fff 0%, var(--bg) 100%);
}

.login-card {
  width: 100%;
  max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  box-shadow: var(--shadow-md);
}

.login-brand { text-align: center; margin-bottom: 1rem; }
.login-mark { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
.login-card h1 { margin: 0; font-size: 1.35rem; color: var(--text); }
.login-desc { color: var(--text-secondary); text-align: center; margin: 0 0 1.5rem; line-height: 1.6; }

label {
  display: block;
  margin-bottom: 1rem;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
}

input, textarea {
  width: 100%;
  margin-top: 0.4rem;
  padding: 0.7rem 0.85rem;
  border-radius: 8px;
  border: 1px solid var(--border-strong);
  background: #fff;
  color: var(--text);
  font: inherit;
  resize: vertical;
}

input:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(184, 148, 31, 0.15);
}

textarea.answer-box { min-height: 110px; }

.btn-primary {
  width: 100%;
  background: linear-gradient(180deg, #d4af37, #b8941f);
  color: #1a1200;
  border: none;
  border-radius: 8px;
  padding: 0.75rem 1rem;
  font-weight: 700;
  cursor: pointer;
}

.btn-primary:hover { filter: brightness(1.05); }

.btn-ghost {
  background: #fff;
  color: var(--text);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 0.55rem 0.9rem;
  font-weight: 600;
  cursor: pointer;
}

.btn-ghost:hover { background: var(--surface-soft); }

.back-link {
  display: block;
  text-align: center;
  margin-top: 1.25rem;
  font-size: 0.9rem;
}

/* ─── Page layout ───────────────────────────────────────────── */
.page {
  min-height: 100vh;
  background: var(--bg);
}

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1.5rem;
  padding: 1.75rem 2rem 1.25rem;
  background: #fff;
  border-bottom: 1px solid var(--border);
}

.eyebrow {
  margin: 0 0 0.25rem;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent-dark);
}

.page-header h1 {
  margin: 0 0 0.35rem;
  font-size: 1.65rem;
  letter-spacing: -0.02em;
}

.subtitle {
  margin: 0;
  color: var(--text-secondary);
  max-width: 560px;
}

.page-header-actions {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
}

/* ─── Dashboard stats ───────────────────────────────────────── */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  padding: 1.25rem 2rem;
}

.stat-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.25rem;
  box-shadow: var(--shadow);
}

.stat-card strong {
  display: block;
  font-size: 1.75rem;
  line-height: 1.1;
  margin-bottom: 0.2rem;
}

.stat-card.pending strong { color: var(--warn); }
.stat-card.learned strong { color: var(--success); }
.stat-card.dismissed strong { color: var(--muted); }
.stat-card.total strong { color: var(--blue); }

.stat-card span {
  color: var(--text-secondary);
  font-size: 0.88rem;
}

/* ─── Tabs ──────────────────────────────────────────────────── */
.view-tabs {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.75rem;
  padding: 0 2rem 1rem;
}

.view-tabs.mode-tabs-3 {
  grid-template-columns: repeat(3, 1fr);
}

.view-tab {
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto;
  gap: 0.15rem 0.75rem;
  text-align: left;
  padding: 1rem 1.15rem;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: #fff;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.view-tab:hover { border-color: var(--border-strong); }

.view-tab.active {
  border-color: var(--accent-border);
  background: var(--accent-soft);
  box-shadow: var(--shadow);
}

.tab-title {
  font-weight: 700;
  color: var(--text);
  grid-column: 1;
}

.tab-desc {
  font-size: 0.82rem;
  color: var(--muted);
  grid-column: 1;
}

.tab-count {
  grid-row: 1 / span 2;
  grid-column: 2;
  align-self: center;
  min-width: 2rem;
  text-align: center;
  font-weight: 800;
  font-size: 1.25rem;
  color: var(--accent-dark);
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 0.25rem 0.55rem;
}

.view-tab.active .tab-count {
  background: #fff;
  border-color: var(--accent-border);
}

/* ─── Content ───────────────────────────────────────────────── */
.content-area {
  padding: 0 2rem 2.5rem;
}

.section-intro {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
  color: var(--text-secondary);
  line-height: 1.55;
}

.section-intro strong { color: var(--text); }

.gaps-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* ─── Gap cards ─────────────────────────────────────────────── */
.gap-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0;
  box-shadow: var(--shadow);
  overflow: hidden;
}

.gap-card.pending-card { border-left: 4px solid var(--warn); }
.gap-card.learned-card { border-left: 4px solid var(--success); }

.gap-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
  padding: 1rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface-soft);
}

.gap-topic {
  font-weight: 700;
  font-size: 1rem;
  color: var(--text);
}

.gap-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; }

.gap-badge {
  font-size: 0.72rem;
  font-weight: 600;
  padding: 0.2rem 0.55rem;
  border-radius: 999px;
  background: #e2e8f0;
  color: var(--text-secondary);
}

.gap-badge.price { background: var(--blue-soft); color: var(--blue); }
.gap-badge.pending { background: var(--warn-soft); color: var(--warn); border: 1px solid var(--warn-border); }
.gap-badge.learned { background: var(--success-soft); color: var(--success); border: 1px solid var(--success-border); }

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 0;
}

.info-block {
  padding: 1rem 1.25rem;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.info-block:last-child { border-right: none; }

.info-block .label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 0.45rem;
}

.info-block .value {
  color: var(--text);
  line-height: 1.55;
  white-space: pre-wrap;
}

.info-block.question { background: #fff; }
.info-block.lucy-said { background: var(--warn-soft); }
.info-block.answer { background: var(--success-soft); }

.info-block.lucy-said .value { color: #7c2d12; }
.info-block.answer .value { color: #14532d; font-weight: 500; }

.gap-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  background: var(--surface-soft);
  font-size: 0.82rem;
  color: var(--muted);
}

.answer-form {
  padding: 1rem 1.25rem 1.25rem;
  background: #fff;
  border-top: 1px solid var(--border);
}

.answer-form label {
  margin-bottom: 0.75rem;
  color: var(--text);
}

.gap-actions {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.btn-save {
  background: var(--success);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 0.65rem 1rem;
  font-weight: 700;
  cursor: pointer;
}

.btn-save:hover { background: #166534; }

.btn-save:disabled { opacity: 0.6; cursor: wait; }

.empty-state {
  text-align: center;
  padding: 3rem 1.5rem;
  background: #fff;
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
  color: var(--text-secondary);
}

.empty-state strong { display: block; font-size: 1.05rem; color: var(--text); margin-bottom: 0.35rem; }

/* ─── System errors / diagnostics ───────────────────────────── */
.system-errors {
  margin: 0 2rem 1rem;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem 1.1rem;
  box-shadow: var(--shadow);
}

.system-errors.all-ok {
  border-color: var(--success-border);
  background: var(--success-soft);
}

.system-errors.has-errors {
  border-color: #fecaca;
  background: var(--danger-soft);
}

.system-errors.has-warns {
  border-color: var(--warn-border);
  background: var(--warn-soft);
}

.system-errors-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 0.75rem;
}

.system-errors-head h2 {
  margin: 0 0 0.25rem;
  font-size: 1.05rem;
}

.system-errors-summary {
  margin: 0;
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.system-errors-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
}

.system-error-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0.65rem 0.85rem;
  align-items: start;
  padding: 0.75rem 0.85rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #fff;
}

.system-error-item.ok {
  border-color: var(--success-border);
}

.system-error-item.error {
  border-color: #fecaca;
}

.system-error-item.warn {
  border-color: var(--warn-border);
}

.system-error-icon {
  width: 1.65rem;
  height: 1.65rem;
  border-radius: 999px;
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 0.85rem;
  flex-shrink: 0;
}

.system-error-item.ok .system-error-icon {
  background: var(--success-soft);
  color: var(--success);
}

.system-error-item.error .system-error-icon {
  background: #fee2e2;
  color: var(--danger);
}

.system-error-item.warn .system-error-icon {
  background: var(--warn-soft);
  color: var(--warn);
}

.system-error-body strong {
  display: block;
  font-size: 0.92rem;
  margin-bottom: 0.15rem;
}

.system-error-body p {
  margin: 0;
  font-size: 0.86rem;
  color: var(--text-secondary);
  line-height: 1.45;
}

.system-error-fix {
  margin-top: 0.35rem !important;
  color: var(--text) !important;
  font-size: 0.82rem !important;
}

.system-error-status {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 0.25rem 0.5rem;
  border-radius: 999px;
  white-space: nowrap;
}

.system-error-status.resolved {
  background: var(--success-soft);
  color: var(--success);
  border: 1px solid var(--success-border);
}

.system-error-status.pending {
  background: #fee2e2;
  color: var(--danger);
  border: 1px solid #fecaca;
}

.system-error-status.watch {
  background: var(--warn-soft);
  color: var(--warn);
  border: 1px solid var(--warn-border);
}

.system-errors-checked {
  margin: 0.75rem 0 0;
  font-size: 0.78rem;
  color: var(--muted);
}

/* ─── Información para Lucy ─────────────────────────────────── */
.info-panel { margin-bottom: 1.25rem; }

.info-grid-panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.info-upload-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  box-shadow: var(--shadow);
}

.info-upload-card h3 {
  margin: 0 0 0.4rem;
  font-size: 1.1rem;
}

.info-upload-card.tips-card {
  border-color: #bfdbfe;
  background: linear-gradient(180deg, #f8fbff 0%, #fff 55%);
}

.info-help {
  margin: 0 0 1rem;
  color: var(--text-secondary);
  font-size: 0.9rem;
  line-height: 1.5;
}

.info-textarea { min-height: 160px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.82rem; }

.info-status {
  margin: 0.75rem 0 0;
  font-size: 0.88rem;
  color: var(--text-secondary);
}

.file-label input[type="file"] {
  margin-top: 0.45rem;
  padding: 0.55rem;
  border: 1px dashed var(--border-strong);
  background: var(--surface-soft);
}

.info-docs-head h3 {
  margin: 0 0 0.25rem;
  font-size: 1.05rem;
}

.info-meta {
  margin-top: 0.2rem;
  font-size: 0.8rem;
  color: var(--muted);
}

.info-preview {
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 0.8rem;
  line-height: 1.45;
  max-height: 220px;
  overflow: auto;
}

.info-edit {
  border-top: 1px solid var(--border);
  padding: 0.75rem 1rem 1rem;
  background: var(--surface-soft);
}

.info-edit summary {
  cursor: pointer;
  font-weight: 600;
  color: var(--accent-dark);
  margin-bottom: 0.5rem;
}

.empty-inline {
  padding: 1rem;
  background: var(--surface-soft);
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
  color: var(--text-secondary);
}

@media (max-width: 768px) {
  .page-header, .dashboard, .view-tabs, .content-area { padding-left: 1rem; padding-right: 1rem; }
  .system-errors { margin-left: 1rem; margin-right: 1rem; }
  .system-error-item { grid-template-columns: auto 1fr; }
  .system-error-status { grid-column: 2; justify-self: start; }
  .info-grid { grid-template-columns: 1fr; }
  .info-block { border-right: none; }
  .view-tabs.mode-tabs-3 { grid-template-columns: 1fr; }
  .info-grid-panels { grid-template-columns: 1fr; }
}

</style>
  <link rel="stylesheet" href="/aprendizaje/styles.css?v=2" />
</head>
<body>
  <div id="app">
    <section id="main-view" class="page">
      <header class="page-header">
        <div class="page-header-text">
          <p class="eyebrow">Lucy · Aprendizaje continuo</p>
          <h1>Aprendizaje de Lucy</h1>
          <p class="subtitle">
            Lo que Lucy aprende de los chats de Alejandro, los huecos del catálogo
            y la información (PDFs y tendencias) que subes para ella.
          </p>
        </div>
        <div class="page-header-actions">
          <button type="button" id="btn-sync-now" class="btn-ghost">Sincronizar chats ahora</button>
          <a href="/panel">← Panel</a>
        </div>
      </header>

      <div class="dashboard" id="stats-row"></div>

      <section id="system-errors" class="system-errors hidden" aria-live="polite">
        <div class="system-errors-head">
          <div>
            <p class="eyebrow">Diagnóstico</p>
            <h2 id="system-errors-title">Estado del sistema</h2>
            <p id="system-errors-summary" class="system-errors-summary"></p>
          </div>
          <button type="button" id="btn-retry-errors" class="btn-ghost">Revisar de nuevo</button>
        </div>
        <ul id="system-errors-list" class="system-errors-list"></ul>
        <p id="system-errors-checked" class="system-errors-checked"></p>
      </section>

      <nav class="view-tabs mode-tabs-3" id="mode-tabs">
        <button type="button" class="view-tab active" data-mode="chats">
          <span class="tab-title">De chats</span>
          <span class="tab-desc">Aprendido con Alejandro</span>
          <span class="tab-count" data-count="chatLearned">0</span>
        </button>
        <button type="button" class="view-tab" data-mode="gaps">
          <span class="tab-title">Huecos de catálogo</span>
          <span class="tab-desc">Preguntas sin precio en Sheet</span>
          <span class="tab-count" data-count="gapPending">0</span>
        </button>
        <button type="button" class="view-tab" data-mode="info">
          <span class="tab-title">Información para Lucy</span>
          <span class="tab-desc">PDFs, catálogos y tendencias</span>
          <span class="tab-count" data-count="infoTotal">0</span>
        </button>
      </nav>

      <nav class="view-tabs secondary-tabs" id="view-tabs">
        <button type="button" class="view-tab active" data-status-key="approved" data-status="approved">
          <span class="tab-title">Ya aprendió</span>
          <span class="tab-desc">En uso por Lucy</span>
          <span class="tab-count" data-count="approved">0</span>
        </button>
        <button type="button" class="view-tab" data-status-key="pending" data-status="pending">
          <span class="tab-title">Por revisar</span>
          <span class="tab-desc">Candidatos nuevos</span>
          <span class="tab-count" data-count="pending">0</span>
        </button>
      </nav>

      <div class="content-area">
        <div id="section-intro" class="section-intro"></div>
        <p id="sync-status" class="sync-status hidden"></p>
        <div id="info-panel" class="info-panel hidden"></div>
        <div id="gaps-list" class="gaps-list"></div>
        <p id="empty-state" class="empty-state hidden"></p>
      </div>
    </section>
  </div>

  <script src="/aprendizaje/app.js?v=7" type="module"></script>
</body>
</html>
