<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aprendizaje de Lucy — Bodasesor</title>
  <base href="/aprendizaje/" />
  <link rel="stylesheet" href="/aprendizaje/styles.css?v=2" />
</head>
<body>
  <div id="app">
    <section id="login-view" class="login-wrap">
      <div class="login-card">
        <div class="login-brand">
          <span class="login-mark">📚</span>
          <h1>Aprendizaje de Lucy</h1>
        </div>
        <p class="login-desc">Aquí ves lo que Lucy <strong>no sabe</strong>, las <strong>respuestas</strong> que le enseñas y todo lo que <strong>ya aprendió</strong> del catálogo.</p>
        <form id="login-form">
          <label>Email<input type="email" id="email" required autocomplete="username" /></label>
          <label>Contraseña<input type="password" id="password" required autocomplete="current-password" /></label>
          <button type="submit" class="btn-primary">Entrar</button>
          <p id="login-error" class="error hidden"></p>
        </form>
        <a href="/panel" class="back-link">← Volver al panel</a>
      </div>
    </section>

    <section id="main-view" class="hidden page">
      <header class="page-header">
        <div class="page-header-text">
          <p class="eyebrow">Lucy · Catálogo</p>
          <h1>Aprendizaje de Lucy</h1>
          <p class="subtitle">Preguntas sin precio en el Sheet, respuestas que tú enseñas y conocimiento ya guardado.</p>
        </div>
        <div class="page-header-actions">
          <a href="/panel">← Panel</a>
          <button type="button" id="logout-btn" class="btn-ghost">Salir</button>
        </div>
      </header>

      <div class="dashboard" id="stats-row"></div>

      <nav class="view-tabs" id="view-tabs">
        <button type="button" class="view-tab active" data-status="pending">
          <span class="tab-title">No sabe</span>
          <span class="tab-desc">Pendientes de enseñar</span>
          <span class="tab-count" data-count="pending">0</span>
        </button>
        <button type="button" class="view-tab" data-status="answered">
          <span class="tab-title">Ya aprendió</span>
          <span class="tab-desc">Respuestas guardadas</span>
          <span class="tab-count" data-count="answered">0</span>
        </button>
      </nav>

      <div class="content-area">
        <div id="section-intro" class="section-intro"></div>
        <div id="gaps-list" class="gaps-list"></div>
        <p id="empty-state" class="empty-state hidden"></p>
      </div>
    </section>
  </div>

  <script src="/aprendizaje/app.js?v=2" type="module"></script>
</body>
</html>
