<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Catálogo | Bodasesor</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #fff;
      color: #162040;
    }
    header {
      background: #162040;
      color: #fff;
      padding: 1.5rem 1rem 1.75rem;
    }
    header .wrap, main .wrap, footer .wrap {
      max-width: 56rem;
      margin: 0 auto;
    }
    .crumb { font-size: 0.75rem; opacity: 0.7; margin-bottom: 0.75rem; }
    .crumb a { color: #f5efe8; text-decoration: none; }
    h1 { margin: 0 0 0.5rem; font-size: clamp(1.5rem, 4vw, 2.25rem); }
    .sub { margin: 0; color: #f5efe8; opacity: 0.9; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 1rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.7rem 1.1rem; border-radius: 0.5rem;
      font-weight: 700; text-decoration: none; border: 0; cursor: pointer;
      font-family: inherit; font-size: 0.95rem;
    }
    .btn-wa { background: #0d6849; color: #fff; }
    .btn-ghost { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.35); }
    main { padding: 1.25rem 1rem 2.5rem; }
    .frame-shell {
      background: #f5efe8;
      border: 1px solid rgba(22,32,64,.12);
      border-radius: 0.85rem;
      overflow: hidden;
      min-height: 320px;
    }
    .poster {
      width: 100%;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem 1.25rem;
      text-align: center;
      background: transparent;
      border: 0;
      cursor: pointer;
      color: inherit;
      font-family: inherit;
    }
    .poster:hover { background: #ebe3d8; }
    .play {
      width: 3.5rem; height: 3.5rem; border-radius: 999px;
      background: #162040; color: #fff;
      display: grid; place-items: center;
    }
    .poster strong { font-size: 1.15rem; }
    .poster span { color: rgba(22,32,64,.65); font-size: 0.9rem; max-width: 28rem; }
    iframe { width: 100%; height: 72vh; min-height: 560px; border: 0; display: block; }
    .hint { text-align: center; color: #6b7280; font-size: 0.85rem; margin-top: 0.75rem; }
    .list { display: grid; gap: 0.65rem; }
    .card {
      display: block; padding: 0.9rem 1rem;
      border: 1px solid rgba(22,32,64,.12); border-radius: 0.75rem;
      text-decoration: none; color: inherit;
    }
    .card:hover { background: #f5efe8; }
    .card small { color: #6b7280; }
    footer { background: #162040; color: #f5efe8; padding: 2rem 1rem; text-align: center; }
    footer a { color: #fff; font-weight: 700; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <nav class="crumb"><a href="/catalogos">Catálogos</a> · vista rápida</nav>
      <h1 id="title">Catálogo Bodasesor</h1>
      <p class="sub" id="sub">Carga liviana — el visual se descarga solo si lo pides.</p>
      <div class="actions">
        <a class="btn btn-wa" id="wa" href="https://api.whatsapp.com/send/?phone=5215540080373&text=Hola%2C%20me%20interesa%20cotizar" target="_blank" rel="noopener">Cotizar por WhatsApp</a>
        <a class="btn btn-ghost" id="full" href="https://bodasesor.com/catalogos" target="_blank" rel="noopener">Sitio completo</a>
      </div>
    </div>
  </header>
  <main>
    <div class="wrap" id="content"></div>
  </main>
  <footer>
    <div class="wrap">
      <p>¿Te gusta este catálogo? <a href="https://api.whatsapp.com/send/?phone=5215540080373&text=Hola%2C%20me%20interesa%20cotizar" target="_blank" rel="noopener">Escríbenos por WhatsApp</a></p>
    </div>
  </footer>
  <script>
    (function () {
      var WA = "https://api.whatsapp.com/send/?phone=5215540080373&text=";
      var path = location.pathname.replace(/\/+$/, "") || "/catalogos";
      var parts = path.split("/").filter(Boolean);
      var slug = parts[0] === "catalogos" ? (parts[1] || "") : "";

      function esc(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
        });
      }

      function mountPoster(title, embedSrc, siteUrl) {
        document.getElementById("title").textContent = title;
        document.getElementById("sub").textContent = "Vista rápida Bodasesor — sin descargar el visual hasta que lo pidas.";
        document.getElementById("full").href = siteUrl;
        document.getElementById("wa").href = WA + encodeURIComponent("Hola, me interesa cotizar " + title);
        var box = document.createElement("div");
        box.className = "frame-shell";
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "poster";
        btn.innerHTML =
          '<span class="play" aria-hidden="true">▶</span>' +
          "<strong>Ver catálogo visual</strong>" +
          "<span>" + esc(title) + " — se carga al tocar (contenido externo bajo demanda)</span>";
        btn.addEventListener("click", function () {
          box.innerHTML = "";
          var iframe = document.createElement("iframe");
          iframe.src = embedSrc;
          iframe.title = "Catálogo " + title;
          iframe.loading = "lazy";
          iframe.referrerPolicy = "no-referrer";
          iframe.setAttribute(
            "sandbox",
            "allow-scripts allow-same-origin allow-popups allow-forms allow-presentation"
          );
          iframe.allow = "fullscreen";
          box.appendChild(iframe);
        });
        box.appendChild(btn);
        var hint = document.createElement("p");
        hint.className = "hint";
        hint.textContent = "No descargamos el catálogo visual hasta que lo pidas — así la página abre enseguida.";
        var content = document.getElementById("content");
        content.appendChild(box);
        content.appendChild(hint);
      }

      fetch("/catalogos/embeds.json", { credentials: "same-origin" })
        .then(function (r) { return r.json(); })
        .then(function (map) {
          if (!slug) {
            document.getElementById("title").textContent = "Catálogos Bodasesor";
            document.getElementById("full").href = "https://bodasesor.com/catalogos";
            var list = document.createElement("div");
            list.className = "list";
            Object.keys(map)
              .sort()
              .forEach(function (key) {
                var item = map[key];
                var a = document.createElement("a");
                a.className = "card";
                a.href = "/catalogos/" + encodeURIComponent(key);
                a.innerHTML = "<strong>" + esc(item.title || key) + "</strong><br><small>" + esc(key) + "</small>";
                list.appendChild(a);
              });
            document.getElementById("content").appendChild(list);
            return;
          }
          var entry = map[slug];
          if (!entry) {
            document.getElementById("title").textContent = "Catálogo no encontrado";
            document.getElementById("content").innerHTML =
              '<p>No encontramos ese catálogo. <a href="/catalogos">Ver todos</a> o el <a href="https://bodasesor.com/catalogos/' +
              encodeURIComponent(slug) +
              '" target="_blank" rel="noopener">sitio completo</a>.</p>';
            return;
          }
          var siteUrl = "https://bodasesor.com/catalogos/" + encodeURIComponent(slug);
          mountPoster(entry.title || slug, entry.embedSrc, siteUrl);
        })
        .catch(function () {
          document.getElementById("content").innerHTML =
            '<p>No se pudo cargar el índice. Abre el <a href="https://bodasesor.com/catalogos/' +
            encodeURIComponent(slug || "") +
            '" target="_blank" rel="noopener">sitio completo</a>.</p>';
        });
    })();
  </script>
</body>
</html>
